# ══════════════════════════════════════════════════════════════════════
# Synodic — Infrastructure Only (for local development)
# ══════════════════════════════════════════════════════════════════════
#
# Runs ONLY the infrastructure: Postgres, FalkorDB, Redis.
# All application services run locally from source (hot-reload).
#
# Start infrastructure:
#   docker compose -f docker-compose.dev.yml up -d
#
# Stop infrastructure (data preserved):
#   docker compose -f docker-compose.dev.yml down
#
# Wipe all data (fresh start):
#   docker compose -f docker-compose.dev.yml down -v
#
# Then run services locally — see ./dev.sh or the commands below.
# ══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: synodic-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: synodic
      POSTGRES_PASSWORD: synodic
      POSTGRES_DB: synodic
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - synchronous_commit=off       # dev only — sacrifices durability for speed
      - -c
      - fsync=off                    # dev only — same caveat
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=200
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synodic -d synodic"]
      interval: 2s
      timeout: 3s
      retries: 20

  # ── FalkorDB (Graph Database) ────────────────────────────────────
  falkordb:
    build:
      context: ./data/quickstart
      dockerfile: Dockerfile.falkordb
    container_name: synodic-falkordb-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "3000:3000"       # FalkorDB Browser UI
    environment:
      FALKORDB_ARGS: THREAD_COUNT 4
    volumes:
      - falkordb_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  # ── Redis 7 (Message Broker) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: synodic-redis-dev
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  postgres_dev_data:
    name: synodic-postgres-dev-data
  falkordb_dev_data:
    name: synodic-falkordb-dev-data
  redis_dev_data:
    name: synodic-redis-dev-data

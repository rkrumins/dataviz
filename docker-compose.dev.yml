# ══════════════════════════════════════════════════════════════════════
# Synodic — Infrastructure Only (for local development)
# ══════════════════════════════════════════════════════════════════════
#
# Runs ONLY the infrastructure: Postgres, FalkorDB, Redis.
# All application services run locally from source (hot-reload).
#
# Start infrastructure:
#   docker compose -f docker-compose.dev.yml up -d
#
# Stop infrastructure (data preserved):
#   docker compose -f docker-compose.dev.yml down
#
# Wipe all data (fresh start):
#   docker compose -f docker-compose.dev.yml down -v
#
# Then run services locally — see ./dev.sh or the commands below.
# ══════════════════════════════════════════════════════════════════════

name: synodic-dev

services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────
  postgres:
    image: postgres:16.4-alpine
    container_name: synodic-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synodic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synodic}
      POSTGRES_DB: ${POSTGRES_DB:-synodic}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=200
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synodic} -d ${POSTGRES_DB:-synodic}"]
      interval: 2s
      timeout: 3s
      retries: 20

  # ── FalkorDB (Graph Database) ────────────────────────────────────
  falkordb:
    build:
      context: ./data/quickstart
      dockerfile: Dockerfile.falkordb
    container_name: synodic-falkordb-dev
    restart: unless-stopped
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
      - "${FALKORDB_UI_PORT:-3000}:3000"       # FalkorDB Browser UI
    environment:
      FALKORDB_ARGS: THREAD_COUNT 4
    volumes:
      - falkordb_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

  # ── Redis 7 (Message Broker) ─────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: synodic-redis-dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_dev_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  postgres_dev_data:
    name: synodic-postgres-dev-data
  falkordb_dev_data:
    name: synodic-falkordb-dev-data
  redis_dev_data:
    name: synodic-redis-dev-data

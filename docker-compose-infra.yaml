# ══════════════════════════════════════════════════════════════════════
# Synodic — Full-Stack Docker Compose
# ══════════════════════════════════════════════════════════════════════
#
# Quick start (full platform):
#   docker compose up --build
#
# Just infrastructure (for local dev with uvicorn):
#   docker compose up falkordb postgres
#
# With demo data seeding:
#   docker compose --profile seed up --build
#
# Tear down (keep data):
#   docker compose down
#
# Tear down + delete all data:
#   docker compose down -v
# ══════════════════════════════════════════════════════════════════════

services:

  # ── FalkorDB (Graph Database) ─────────────────────────────────────
  falkordb:
    image: falkordb/falkordb:v4.16.0
    ports:
      - "6379:6379"
      - "3000:3000"       # FalkorDB Browser UI
    environment:
      FALKORDB_ARGS: THREAD_COUNT 4
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── PostgreSQL (Management Database) ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: synodic
      POSTGRES_PASSWORD: synodic
      POSTGRES_DB: synodic
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synodic"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  falkordb_data:
  postgres_data:

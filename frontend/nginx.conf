server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ── Liveness probe (nginx is up) — Docker HEALTHCHECK / K8s liveness
    location = /health {
        access_log off;
        return 200 '{"status":"healthy","service":"frontend"}';
        add_header Content-Type application/json;
    }

    # ── Readiness probe — checks that backend is reachable (K8s readiness)
    location = /readyz {
        access_log off;
        proxy_pass         http://viz-service:8000/health;
        proxy_read_timeout 3s;
        proxy_connect_timeout 2s;
    }

    # ── Visualization Service API docs (/openapi.json, /docs, /redoc) ─
    location = /openapi.json {
        proxy_pass         http://viz-service:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location = /viz-docs {
        proxy_pass         http://viz-service:8000/docs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location = /viz-redoc {
        proxy_pass         http://viz-service:8000/redoc;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Graph Service API docs ──────────────────────────────────────
    location = /graph-docs {
        proxy_pass         http://graph-service:8001/docs;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location = /graph-openapi.json {
        proxy_pass         http://graph-service:8001/openapi.json;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Visualization Service API (/api/*) ────────────────────────────
    location /api/ {
        proxy_pass         http://viz-service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Graph Service API (/graph/*) ──────────────────────────────────
    location /graph/ {
        proxy_pass         http://graph-service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Frontend SPA — client-side routing fallback ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
